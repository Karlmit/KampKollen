name: Publish Docker image

on:
  push:
    tags:
      - 'v*'

env:
  IMAGE: ghcr.io/karlmit/kampkollen

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to create releases
      packages: write   # needed to push to ghcr.io

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ steps.version.outputs.VERSION }}
            ${{ env.IMAGE }}:latest

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          name: KampKollen ${{ steps.version.outputs.VERSION }}
          body: |
            ## Docker image

            ```
            ghcr.io/karlmit/kampkollen:${{ steps.version.outputs.VERSION }}
            ```

            ### Update on Unraid

            Change the image tag in your `docker-compose.unraid.yml`:
            ```yaml
            image: ghcr.io/karlmit/kampkollen:${{ steps.version.outputs.VERSION }}
            ```
            Then run `docker compose pull && docker compose up -d`.
          generate_release_notes: true
